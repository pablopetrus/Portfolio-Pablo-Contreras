name: Generate CV PDF

on:
  push:
    branches:
      - main
    paths:
      - 'index.html'
      - 'scripts/generate_pdf.cjs'

permissions:
  contents: write

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install puppeteer

      - name: Generate PDF
        run: node scripts/generate_pdf.cjs

      - name: Commit PDF
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add cv/Pablo_Contreras_CV.pdf
          git commit -m "docs: auto-update CV PDF" || echo "No changes to commit"
          git push
